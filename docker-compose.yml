# Local orchestration. As we add services (Postgres now; Redis, Kafka later),
# each becomes a sibling here on a shared private network, started with one command.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Inside the compose network the database is reachable at the service name "postgres",
      # not localhost. Double-underscore maps to the ConnectionStrings:ReefPulse config key.
      - ConnectionStrings__ReefPulse=Host=postgres;Port=5432;Database=reefpulse;Username=reefpulse;Password=reefpulse
      - Ingestion__Enabled=true
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=reefpulse
      - POSTGRES_USER=reefpulse
      - POSTGRES_PASSWORD=reefpulse
    ports:
      - "5432:5432"
    volumes:
      - reefpulse-pgdata:/var/lib/postgresql/data
    healthcheck:
      # Compose won't mark Postgres "healthy" (or start the api) until this passes.
      test: ["CMD-SHELL", "pg_isready -U reefpulse -d reefpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

# A named volume persists the database files across container restarts,
# so your data survives `docker compose down` + `up` again.
volumes:
  reefpulse-pgdata:
